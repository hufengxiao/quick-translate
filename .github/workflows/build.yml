name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install loguru pyinstaller

      - name: Verify imports
        run: python -c "import sys; sys.path.insert(0, '.'); from src.utils.config import load_config; print('imports OK')"

      - name: Run tests
        run: python ci_test.py

      - name: Build EXE
        run: pyinstaller quicktranslate.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickTranslate-${{ matrix.python-version }}
          path: dist/QuickTranslate.exe
